                        <img src="${thumbUrl}" alt="Thumbnail" class="thumb-image w-full aspect-video object-cover">
                        
                        <!-- Fake Duration -->
                        <div class="absolute bottom-2 right-2 bg-black bg-opacity-90 text-white text-xs font-bold px-2 py-1 rounded-md tracking-wider border border-gray-700">
                            ${vid.duration}
                        </div>
                        
                        <!-- Play Hover Icon -->
                        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all duration-300 flex items-center justify-center">
                            <div class="w-14 h-14 rounded-full bg-[#ff2a5f] flex items-center justify-center opacity-0 group-hover:opacity-100 transform scale-50 group-hover:scale-100 transition-all duration-300 shadow-[0_0_20px_rgba(255,42,95,0.8)]">
                                <i class="fas fa-play text-white ml-1 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-3 flex gap-3 items-start flex-grow">
                        <div class="w-10 h-10 rounded-full bg-gray-700 flex-shrink-0 border border-gray-600 overflow-hidden">
                             <img src="https://ui-avatars.com/api/?name=A+V&background=222&color=ff2a5f" alt="Avatar">
                        </div>
                        <div class="flex-1">
                            <h3 class="text-sm font-semibold text-gray-200 line-clamp-2 group-hover:text-[#ff2a5f] transition leading-snug">${vid.title}</h3>
                            <p class="text-xs text-gray-400 mt-1.5 hover:text-white transition">HijabersAV <i class="fas fa-check-circle text-[#ff2a5f] text-[10px] ml-0.5"></i></p>
                            <div class="flex items-center text-xs text-gray-500 mt-1">
                                <span>${vid.views} views</span>
                                <span class="mx-1.5 text-[8px]"><i class="fas fa-circle"></i></span>
                                <span>${vid.date}</span>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                videoGrid.innerHTML += card;
            });
        }

        function openPlayer(id) {
            currentVideoData = videoDatabase.find(v => v.id === id);
            
            homePage.classList.add('hidden');
            playerPage.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.getElementById('player-title').innerText = currentVideoData.title;
            document.getElementById('player-views').innerHTML = `<i class="fas fa-eye text-[#ff2a5f] mr-2 text-lg"></i> ${currentVideoData.views} Views`;

            // Setup Click-to-Play Overlay (Fake Player)
            const thumbUrl = `https://img.youtube.com/vi/${currentVideoData.ytId}/maxresdefault.jpg`;
            const overlay = document.getElementById('click-to-play-overlay');
            const fsBtn = document.getElementById('fs-btn');
            
            overlay.style.backgroundImage = `url('${thumbUrl}')`;
            overlay.style.display = 'flex';
            fsBtn.classList.add('hidden'); // Sembunyikan tombol fullscreen sblm play
            
            const existingIframe = document.getElementById('yt-iframe');
            if(existingIframe) existingIframe.remove();

            // Setup Overlay Click event
            overlay.onclick = function() {
                loadIframe(currentVideoData.ytId);
                overlay.style.display = 'none'; 
                fsBtn.classList.remove('hidden'); // Munculkan tombol fullscreen
                
                // Di sini biasanya script Popunder Adsterra disisipkan
                console.log("Simulasi Popunder Terpicu (KLIK PERTAMA)");
            };

            renderRelatedVideos();
        }

        function loadIframe(ytId) {
            const container = document.getElementById('player-container');
            
            // Parameter Youtube: 
            // autoplay=1, modestbranding=1 (hide logo), rel=0 (no random suggest), iv_load_policy=3 (no annotations)
            const iframeHTML = `
                <iframe id="yt-iframe" 
                    src="https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&controls=1&showinfo=0&iv_load_policy=3" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
            container.insertAdjacentHTML('afterbegin', iframeHTML);
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('player-container');
            
            if (!document.fullscreenElement) {
                // Masuk ke fullscreen (Membawa kotak wrapper beserta iframe yang sudah di-zoom)
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                } else if (wrapper.msRequestFullscreen) {
                    wrapper.msRequestFullscreen();
                }
            } else {
                // Keluar dari fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function renderRelatedVideos() {
            relatedGrid.innerHTML = '';
            const shuffled = [...videoDatabase].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 6);

            selected.forEach(vid => {
                const thumbUrl = `https://img.youtube.com/vi/${vid.ytId}/hqdefault.jpg`;
                
                const card = `
                <div class="flex gap-3 cursor-pointer group bg-[#111] p-2 rounded-lg border border-transparent hover:border-gray-800 transition" onclick="openPlayer(${vid.id})">
                    <div class="w-40 h-24 flex-shrink-0 relative rounded-md bg-gray-900 overflow-hidden shadow-sm">
                        <img src="${thumbUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                        <div class="absolute bottom-1 right-1 bg-black bg-opacity-90 text-white text-[10px] font-bold px-1.5 py-0.5 rounded border border-gray-700">
                            ${vid.duration}
                        </div>
                    </div>
                    <div class="flex-1 py-0.5">
                        <h4 class="text-sm font-semibold text-gray-300 line-clamp-2 leading-tight group-hover:text-[#ff2a5f] transition">${vid.title}</h4>
                        <p class="text-xs text-gray-500 mt-1 hover:text-white transition">HijabersAV</p>
                        <p class="text-xs text-gray-600 mt-0.5">${vid.views} views</p>
                    </div>
                </div>
                `;
                relatedGrid.innerHTML += card;
            });
        }

        function goHome() {
            // Hentikan video jika ada
            const existingIframe = document.getElementById('yt-iframe');
            if(existingIframe) existingIframe.remove();

            playerPage.classList.add('hidden');
            homePage.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Mulai aplikasi
        window.onload = function() {
            renderHome();
        };

    </script>
</body>
</html>
